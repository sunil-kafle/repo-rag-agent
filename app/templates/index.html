<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repository RAG Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" type="image/png" href="/static/doc_icon.png" />
</head>
<body>
  <div class="page">
    <div class="app-container">
      <header class="hero">
        <div class="hero-header">
          <img src="/static/doc_icon.png" alt="Repository RAG Agent icon" class="hero-icon" />
          <div class="hero-text">
            <h1 class="app-title">Repository RAG Agent</h1>
            <p class="app-subtitle">Ask questions about the indexed repository and get grounded answers with citations</p>
          </div>
        </div>
      </header>

      <main id="chat-messages" class="chat-messages"></main>

      <form id="chat-form" class="chat-form">
        <textarea
          id="question-input"
          class="chat-input"
          placeholder="Ask your question..."
          rows="3"
          required
        ></textarea>
        <div class="chat-actions">
          <button id="send-button" class="send-button" type="submit">Send</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
